services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -d ${POSTGRES_DB:-app} -U ${POSTGRES_USER:-postgres}",
        ]
      interval: 1m
      timeout: 1s
      retries: 3
      start_period: 30s
      start_interval: 1s

  backend:
    build:
      context: ./backend
    image: slippi-replay-hosting-server-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      REPLAY_VIEW_ARCHIVE_DIR: /app/uploads-view-archive
    ports:
      - "8000:8000"
      - "${FTP_PORT:-2121}:${FTP_PORT:-2121}"
      - "${FTP_PASSIVE_PORTS:-22100-22199}:${FTP_PASSIVE_PORTS:-22100-22199}"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./uploads-view-archive:/app/uploads-view-archive
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)\"",
        ]
      interval: 1m
      timeout: 3s
      retries: 3
      start_period: 45s
      start_interval: 1s
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    image: slippi-replay-hosting-server-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  httpd:
    image: httpd:2.4-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./httpd/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro

  # slippilab:
